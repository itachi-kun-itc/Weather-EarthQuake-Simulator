<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <title>Weather EarthQuake Simulator</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="./styles.css?v=0.1.0" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel panel-active" id="earthquake-panel" aria-labelledby="earthquake-tab">
        <header class="topbar">
          <div>
            <p class="eyebrow">Earthquake Simulation</p>
            <h1>地震</h1>
          </div>
          <div class="status" id="map-status">地図データを読み込み中</div>
        </header>

        <div class="map-wrap">
          <div id="map" aria-label="地震地域区分の日本地図"></div>

          <section class="sim-panel" id="setup-panel" aria-label="震源設定">
            <button class="sheet-handle" type="button" aria-label="メニューを開閉"></button>
            <div class="sim-panel-head">
              <div>
                <p class="eyebrow">Epicenter</p>
                <h2>震源設定</h2>
              </div>
              <button class="icon-button" id="reset-epicenter" type="button" title="震源を初期位置に戻す">
                ↺
              </button>
            </div>

            <label class="toggle-row">
              <input id="epicenter-edit-toggle" type="checkbox" checked />
              <span>震源地を設定</span>
            </label>
            <div class="control-separator" aria-hidden="true"></div>

            <div class="toggle-grid" aria-label="震度表示切り替え">
              <label class="toggle-row">
                <input id="station-layer-toggle" type="checkbox" />
                <span>観測点</span>
              </label>
              <label class="toggle-row">
                <input id="region-layer-toggle" type="checkbox" checked />
                <span>震央区分</span>
              </label>
              <label class="toggle-row">
                <input id="eew-warning-toggle" type="checkbox" />
                <span>緊急地震速報（警報）</span>
              </label>
            </div>

            <label class="field">
              <span>地震プリセット</span>
              <select id="historical-earthquake-select">
                <option value="">プリセットを選択</option>
              </select>
            </label>

            <label class="field">
              <span>震央名</span>
              <input id="epicenter-region" type="text" readonly />
            </label>

            <div class="field-grid">
              <label class="field">
                <span>緯度</span>
                <input id="latitude-input" type="text" inputmode="decimal" autocomplete="off" pattern="[0-9.]*" />
              </label>
              <label class="field">
                <span>経度</span>
                <input id="longitude-input" type="text" inputmode="decimal" autocomplete="off" pattern="[0-9.]*" />
              </label>
            </div>

            <div class="field-grid">
              <label class="field">
                <span>深さ</span>
                <select id="depth-input"></select>
              </label>
              <label class="field">
                <span>マグニチュード</span>
                <select id="magnitude-input"></select>
              </label>
            </div>

            <label class="field">
              <span>震度配色</span>
              <select id="intensity-color-scheme">
                <option value="low">低コントラスト</option>
                <option value="normal" selected>通常</option>
                <option value="high">高コントラスト</option>
              </select>
            </label>

            <dl class="result-list">
              <div>
                <dt>市町村</dt>
                <dd id="municipality-output">未選択</dd>
              </div>
              <div>
                <dt>最大震度</dt>
                <dd id="max-intensity-output">未計算</dd>
              </div>
            </dl>

            <button class="simulation-start" id="simulation-start" type="button">
              シミュレーション開始
            </button>
          </section>

          <section class="sim-panel simulation-panel hidden" id="simulation-panel" aria-label="シミュレーション結果">
            <button class="sheet-handle" type="button" aria-label="メニューを開閉"></button>
            <div class="simulation-summary">
              <div class="max-shindo-card">
                <span>最大震度</span>
                <strong id="simulation-max-intensity">-</strong>
              </div>
              <div class="magnitude-card">
                <span>マグニチュード</span>
                <strong id="simulation-magnitude">M -</strong>
              </div>
            </div>

            <div class="wave-readout">
              <div>
                <dt>経過時間</dt>
                <dd id="simulation-time">0.0 秒</dd>
              </div>
              <div>
                <dt>震源地</dt>
                <dd id="simulation-epicenter">-</dd>
              </div>
              <div>
                <dt>震央名</dt>
                <dd id="simulation-region-name">-</dd>
              </div>
              <div>
                <dt>深さ</dt>
                <dd id="simulation-depth">-</dd>
              </div>
            </div>

            <div class="simulation-layer-toggles" aria-label="シミュレーション表示切り替え">
              <label class="toggle-row">
                <input id="simulation-region-layer-toggle" type="checkbox" checked />
                <span>震央区分</span>
              </label>
              <label class="toggle-row">
                <input id="simulation-station-layer-toggle" type="checkbox" />
                <span>観測点</span>
              </label>
              <label class="toggle-row">
                <input id="simulation-eew-warning-toggle" type="checkbox" />
                <span>緊急地震速報（警報）</span>
              </label>
            </div>

            <section class="max-stations-block">
              <h2>地震観測点一覧</h2>
              <ol id="max-station-list"></ol>
            </section>

            <div class="simulation-actions">
              <button class="simulation-pause" id="simulation-pause" type="button">一時停止</button>
              <button class="simulation-stop" id="simulation-stop" type="button">シミュレーション中止</button>
            </div>
          </section>

          <section class="intensity-legend" aria-label="震度凡例">
            <h2>震度</h2>
            <div class="intensity-scale">
              <span style="--color: #5f007e">7</span>
              <span style="--color: #a50034">6+</span>
              <span style="--color: #e60012">6-</span>
              <span style="--color: #ff8a00; --text-color: #111827">5+</span>
              <span style="--color: #ffd400; --text-color: #111827">5-</span>
              <span style="--color: #fff2a8; --text-color: #111827">4</span>
              <span style="--color: #0068b7">3</span>
              <span style="--color: #74d7ff; --text-color: #111827">2</span>
              <span style="--color: #ffffff; --text-color: #111827">1</span>
              <span style="--color: #d9dde3; --text-color: #1f2937">0</span>
            </div>
          </section>

          <section class="eew-forecast-panel hidden" id="eew-forecast-panel" aria-label="緊急地震速報（警報）">
            <h2>緊急地震速報（警報）</h2>
            <ul id="eew-forecast-list"></ul>
          </section>
        </div>
      </section>

      <section class="panel" id="weather-panel" aria-labelledby="weather-tab">
        <header class="topbar">
          <div>
            <p class="eyebrow">Weather Simulation</p>
            <h1>気象</h1>
          </div>
          <div class="status">準備中</div>
        </header>
        <div class="empty-state">
          <p>気象タブの表示エリアです。</p>
        </div>
      </section>
    </main>

    <nav class="bottom-tabs" aria-label="シミュレーション切り替え">
      <button class="tab active" id="earthquake-tab" type="button" data-panel="earthquake-panel">
        地震
      </button>
      <button class="tab" id="weather-tab" type="button" data-panel="weather-panel">気象</button>
    </nav>

<script>
      (function () {
        try {
          const bootstrapKey = 'ws_bootstrap_checked';
          const url = new URL(location.href);
          const hasBootstrapParam = url.searchParams.has('_wsv');

          if (!sessionStorage.getItem(bootstrapKey) && !hasBootstrapParam) {
            sessionStorage.setItem(bootstrapKey, '1');
            url.searchParams.set('_wsv', Date.now());
            location.replace(url.toString());
            return;
          }

          if (hasBootstrapParam) {
            url.searchParams.delete('_wsv');
            history.replaceState(null, '', url.toString());
          }
        } catch (e) {
          console.warn('bootstrap refresh failed', e);
        }
      })();
    </script>
    <script src="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.js"></script>
    <script src="./app.js?v=0.1.0"></script>
  </body>
</html>
