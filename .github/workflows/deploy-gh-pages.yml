name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Allow the workflow to push to the repository (required for gh-pages publish)
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: ./web
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
